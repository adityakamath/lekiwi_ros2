controller_manager:
  ros__parameters:
    update_rate: 50  # Hz
    statistics_publish_rate: 0.0  # Disable /controller_manager/statistics/* topics
    
    # Command and error handling
    enforce_command_limits: true  # Enforce URDF joint limits via JointSaturationLimiter
    handle_exceptions: true       # Graceful error handling
    
    # Hardware component initialization
    defaults:
      switch_controller:
        strictness: strict
      allow_controller_activation_with_inactive_hardware: false
      deactivate_controllers_on_hardware_self_deactivate: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    base_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel_joint
      - back_wheel_joint
      - right_wheel_joint
    interfaces:
      - position
      - velocity
      - effort
      - voltage
      - temperature
      - current
      - is_moving

base_controller:
  ros__parameters:
    # Wheel geometry - 3 wheels at 60°, 180°, 300° from +X axis
    wheel_offset: 1.0471975511965976  # 60° in radians (π/3 exactly)
    wheel_names:
      - left_wheel_joint   # 60° from +X
      - back_wheel_joint   # 180° from +X (60° + 120°)
      - right_wheel_joint  # 300° from +X (60° + 240°)

    # Robot dimensions
    robot_radius: 0.132239  # meters (distance from center to wheel contact point)
    wheel_radius: 0.051  # meters

    # Frame IDs
    odom_frame_id: odom
    base_frame_id: base_footprint

    # Odometry settings
    enable_odom_tf: true
    open_loop: false  # Use wheel feedback for odometry
    position_feedback: false  # Use velocity-based odometry when false

    # Command timeout
    cmd_vel_timeout: 0.5  # seconds

    # Velocity and Acceleration limits (based on omnidirectional kinematics)
    # NOTE: These values must match (or be less than) the URDF calculations in base.urdf.xacro
    # NOTE: These values can be overridden in the launch file
    #
    # COMBINED-MOTION SAFETY CONSTRAINT:
    #   The joint limit is 4.433 rad/s = 0.226 m/s / wheel_radius.
    #   OmniWheel IK superposes all DoFs on each wheel, so limits must be set such that
    #   the worst-case 3-DoF combination stays within the joint limit.
    #
    #   Left/right wheel (vx+vy+ωz worst case — all three DoFs stack on these wheels):
    #     (sin(60°) * vx_max + 0.5 * vy_max + robot_radius * ωz_max) / wheel_radius ≤ 4.433
    #     → 0.866 * 0.13 + 0.5 * 0.11 + 0.132239 * 0.44 = 0.226 m/s → 4.43 rad/s  ✓
    #
    #   Back wheel (vy+ωz only — vx does not contribute at 180°):
    #     (vy_max + robot_radius * ωz_max) / wheel_radius ≤ 4.433
    #     → 0.11 + 0.132239 * 0.44 = 0.168 m/s → 3.30 rad/s  ✓
    #
    # max_acceleration: SOFTWARE ramp limit applied by OmniWheelDriveController to incoming cmd_vel.
    #   sts_hardware_interface uses proportional per-wheel ACC (see base.control.xacro: proportional_acc_max /
    #   proportional_acc_deadband) so all wheels finish ramping in equal wall-clock time regardless of
    #   their individual velocity deltas. Slower ramps (200ms) reduce per-cycle velocity deltas and
    #   improve motor tracking synchronisation, minimising rotation artefacts during strafing.
    #   NOTE: per-cycle step must exceed proportional_acc_deadband (0.05 rad/s) to activate ACC.
    #   At 50 Hz with max_acc=0.55 m/s²: step = 0.011 m/s → 0.216 rad/s at back wheel >> 0.05 ✓
    linear:
      x:
        max_velocity: 0.13   # m/s  (3-DoF safe: 0.866*0.13 + 0.5*0.11 + R*0.44 = 0.226 m/s)
        max_acceleration: 0.65  # m/s^2  (~200ms ramp to full speed)
      y:
        max_velocity: 0.11   # m/s  (3-DoF safe: leaves budget for vx and ωz contributions)
        max_acceleration: 0.55  # m/s^2  (~200ms ramp to full speed)
    angular:
      z:
        max_velocity: 0.44   # rad/s  (3-DoF safe: R*0.44 = 0.058 m/s wheel contribution)
        max_acceleration: 2.2   # rad/s^2  (~200ms ramp to full speed)