controller_manager:
  ros__parameters:
    update_rate: 50  # Hz
    statistics_publish_rate: 0.0  # Disable /controller_manager/statistics/* topics
    
    # Command and error handling
    enforce_command_limits: true  # Enforce URDF joint limits via JointSaturationLimiter
    handle_exceptions: true       # Graceful error handling
    
    # Hardware component initialization
    defaults:
      switch_controller:
        strictness: strict
      allow_controller_activation_with_inactive_hardware: false
      deactivate_controllers_on_hardware_self_deactivate: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    base_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel_joint
      - back_wheel_joint
      - right_wheel_joint
    interfaces:
      - position
      - velocity
      - effort
      - voltage
      - temperature
      - current
      - is_moving

base_controller:
  ros__parameters:
    # Wheel geometry - 3 wheels at 60°, 180°, 300° from +X axis
    wheel_offset: 1.0471975511965976  # 60° in radians (π/3 exactly)
    wheel_names:
      - left_wheel_joint   # 60° from +X
      - back_wheel_joint   # 180° from +X (60° + 120°)
      - right_wheel_joint  # 300° from +X (60° + 240°)

    # Robot dimensions
    robot_radius: 0.132239  # meters (distance from center to wheel contact point)
    wheel_radius: 0.051  # meters

    # Frame IDs
    odom_frame_id: odom
    base_frame_id: base_footprint

    # Odometry settings
    enable_odom_tf: true
    open_loop: false  # Use wheel feedback for odometry
    position_feedback: false  # Use velocity-based odometry when false

    # Command timeout
    cmd_vel_timeout: 0.5  # seconds

    # Velocity and Acceleration limits (based on omnidirectional kinematics)
    # NOTE: These values must match (or be less than) the URDF calculations in base.urdf.xacro
    # NOTE: These values can be overridden in the launch file
    #
    # COMBINED-MOTION SAFETY CONSTRAINT:
    #   The joint limit is 4.433 rad/s = 0.226 m/s / wheel_radius.
    #   OmniWheel IK superposes all DoFs on each wheel, so limits must be set such that
    #   the worst-case 2-DoF combination stays within the joint limit.
    #
    #   Back wheel (vy+ωz worst case):
    #     (vy_max + robot_radius * ωz_max) / wheel_radius ≤ 4.433
    #     → 0.15 + 0.132239 * 0.575 = 0.226 m/s → 4.43 rad/s  ✓
    #
    #   Left/right wheel (vx+ωz worst case):
    #     (sin(60°) * vx_max + robot_radius * ωz_max) / wheel_radius ≤ 4.433
    #     → 0.866 * 0.17 + 0.132239 * 0.575 = 0.223 m/s → 4.37 rad/s  ✓
    #
    # max_acceleration: SOFTWARE ramp limit applied by OmniWheelDriveController to incoming cmd_vel.
    linear:
      x:
        max_velocity: 0.17   # m/s  (reduced from 0.261 to keep vx+ωz within joint limit)
        max_acceleration: 0.85  # m/s^2  (~200ms ramp to full speed, reduced for smoother tracking)
      y:
        max_velocity: 0.15   # m/s  (reduced from 0.226 to leave budget for ωz: 0.15 + R*0.575 = 0.226)
        max_acceleration: 0.75  # m/s^2  (~200ms ramp to full speed, reduced for smoother tracking)
    angular:
      z:
        max_velocity: 0.575  # rad/s  (0.076 m/s wheel contribution: 0.226 - 0.15 = 0.076; 0.076/0.132239)
        max_acceleration: 2.88  # rad/s^2  (~200ms ramp to full speed, reduced for smoother tracking)