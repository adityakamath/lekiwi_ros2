teleop_node:
  ros__parameters:
    # Joy node parameters
    device_id: 0
    deadzone: 0.1
    autorepeat_rate: 20.0

    # Teleop twist joy parameters
    # For holonomic (omni-wheel) robot control
    axis_linear:
      x: 1  # Left stick vertical (forward/backward)
      y: 0  # Left stick horizontal (strafe left/right)
    scale_linear:
      x: 0.13  # m/s - matches base_controller max_velocity for X
      y: 0.11  # m/s - matches base_controller max_velocity for Y
    scale_linear_turbo:
      x: 0.13  # m/s - full speed (matches base_controller limit)
      y: 0.11  # m/s - full speed (matches base_controller limit)

    axis_angular:
      yaw: 2  # Right stick horizontal (rotation)
    scale_angular:
      yaw: 0.44  # rad/s - matches base_controller max_velocity for Z
    scale_angular_turbo:
      yaw: 0.44  # rad/s - matches base_controller max_velocity for Z

    enable_button: 9  # L1
    enable_turbo_button: -1  # -1 = Disabled

    # Inverted axes (set to true if needed)
    inverted_reverse: false

    # Publish TwistStamped instead of Twist
    publish_stamped_twist: true
